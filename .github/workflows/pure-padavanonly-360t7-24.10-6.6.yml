name: pure-padavanonly-360t7-24.10-6.6

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      clean:
        description: 'clean ccache'
        default: 'false'
        required: false

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-24.10
  REPO_BRANCH: openwrt-24.10-6.6
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: pure.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检查项目分支
      uses: actions/checkout@main

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential gawk gcc-multilib g++-multilib gettext libncurses-dev python3-distutils zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        export TZ="${{ env.TZ }}"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        echo "FIRMWARE_VERSION=$(date +"%y%m%d")" >> $GITHUB_ENV
        echo "START_DATE=$(date +'%Y年%m月%d日 %H点%M分%S秒')" >> $GITHUB_ENV

    - name: 下载源码
      run: |
        df -hT $GITHUB_WORKSPACE
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

    - name: 加载软件源
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新软件源
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装软件源
      run: cd openwrt && ./scripts/feeds install -a

    - name: 加载自定义配置
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 下载包
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j16
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "========== 开始编译，使用 $(nproc) 线程 =========="
        
        # 分级编译策略 + 正确状态判断
        if make -j$(nproc); then
          echo "✅ 编译成功 (多线程)"
          echo "status=success" >> $GITHUB_OUTPUT
        elif make -j1; then
          echo "✅ 编译成功 (单线程)"
          echo "status=success" >> $GITHUB_OUTPUT
        elif make -j1 V=s; then
          echo "✅ 编译成功 (单线程+详细日志)"
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "❌ 编译失败！"
          echo "status=failed" >> $GITHUB_OUTPUT
          # 发送 PushPlus 通知（需提前在 Secrets 配置 PUSHPLUS_TOKEN）
          if [ -n "${{ secrets.PUSHPLUS_TOKEN }}" ]; then
            curl -k -s -X POST "http://www.pushplus.plus/send" \
              -H "Content-Type: application/json" \
              -d "{
                \"token\": \"${{ secrets.PUSHPLUS_TOKEN }}\",
                \"title\": \"OpenWrt-360T7 编译失败\",
                \"content\": \"编译版本：${{ env.FIRMWARE_VERSION }}\n开始时间：${{ env.START_DATE }}\n结束时间: $(date +'%Y年%m月%d日 %H点%M分%S秒')\n请查看 Actions 日志排查\",
                \"channel\": \"cp\",
                \"webhook\": \"server\"
              }" || true
          fi
          exit 1
        fi

    - name: 整理固件
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        echo "📦 当前目录文件列表："
        ls -lah
        
        # 删除不需要的文件
        rm -rf packages version.buildinfo profiles.json *rootfs* *kernel* *.manifest sha256sums
        
        # 安全重命名固件（先检查文件是否存在）
        shopt -s nullglob
        sysupgrade_files=(*sysupgrade.bin)
        factory_files=(*factory.bin)
        shopt -u nullglob
        
        if [ ${#sysupgrade_files[@]} -ge 1 ]; then
          mv "${sysupgrade_files[0]}" "${{ env.FIRMWARE_VERSION }}-ImmortalWrt-360T7-108M-sysupgrade.bin"
          echo "✅ 已重命名 sysupgrade 固件"
        else
          echo "⚠️ 未找到 sysupgrade.bin 文件"
        fi
        
        if [ ${#factory_files[@]} -ge 1 ]; then
          mv "${factory_files[0]}" "${{ env.FIRMWARE_VERSION }}-ImmortalWrt-360T7-108M-factory.bin"
          echo "✅ 已重命名 factory 固件"
        else
          echo "⚠️ 未找到 factory.bin 文件（部分设备可能不生成）"
        fi
        
        # 验证最终输出
        echo "📦 最终待上传文件："
        ls -lah *.bin 2>/dev/null || { echo "❌ 无固件文件可上传"; exit 1; }
        
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件到 Github Action 空间
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: ${{ env.FIRMWARE_VERSION }}-OpenWrt-360T7
        path: ${{ env.FIRMWARE }}/*.bin
        retention-days: 7

    - name: 创建 release 标签
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        time=$(date +%Y.%m.%d)
        release_tag="360T7-24.10-6.6-ImmortalWrt-$time"
        release_name="360T7-24.10-6.6-ImmortalWrt-$time"
        cat > release.txt << EOF
        ## 📦 ImmortalWrt for 360T7
        
        - 源码分支：${{ env.REPO_BRANCH }}
        - 编译时间：${{ env.START_DATE }}
        - 固件版本：${{ env.FIRMWARE_VERSION }}
        
        ### 🔧 默认信息
        - 默认网关：192.168.77.1
        - 登录密码：无（首次登录请设置）
        
        ### 📦 内置组件
        - OpenClash
        
        > ⚠️ 刷写前请备份原固件，刷机有风险，操作需谨慎
        EOF
        echo "release_name=$release_name" >> $GITHUB_OUTPUT
        echo "release_tag=$release_tag" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 将固件上传到 release
      uses: softprops/action-gh-release@v1
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        name: ${{ steps.tag.outputs.release_name }}
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: |
          ${{ env.FIRMWARE }}/*sysupgrade.bin
          ${{ env.FIRMWARE }}/*factory.bin
        draft: false
        prerelease: false

    - name: 删除旧的工作流运行记录
      uses: GitRML/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 3

    - name: 删除旧的 releases
      uses: dev-drprasad/delete-older-releases@v0.2.1
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 10
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

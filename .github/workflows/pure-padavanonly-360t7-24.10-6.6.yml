name: pure-padavanonly-360t7-24.10-6.6

# ==================== 环境变量配置 ====================
env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: 6.6_pure.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  # 是否上传 bin 目录到 Actions 产物
  UPLOAD_BIN_DIR: true
  # 是否上传固件到 Actions 产物
  UPLOAD_FIRMWARE: true
  # 是否上传到奶牛快传
  UPLOAD_COWTRANSFER: false
  # 是否上传到 WeTransfer
  UPLOAD_WETRANSFER: false
  # 是否发布到 GitHub Releases
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai


on:
  # 手动通过 API 触发 (可用于外部系统调用)
  repository_dispatch:
  # 手动点击按钮触发 (支持传入参数)
  workflow_dispatch:
    inputs:
      ssh:
        description: '启用 SSH 远程连接调试'
        required: false
        default: 'false'


# ==================== 编译任务定义 ====================
jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # [1] 检出仓库代码
    - name: 检出源码
      uses: actions/checkout@main

    # [2] 清理磁盘空间 (释放约6GB，避免编译时空间不足)
    - name: 释放磁盘空间 (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    # [3] 初始化编译环境 (安装依赖包 + 配置时区)
    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive  # 避免交互式提示阻断安装
      run: |
        sudo timedatectl set-timezone "$TZ"
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-mark hold grub-efi-amd64-signed
        sudo apt update -y
        sudo apt full-upgrade -y
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    # [4] 克隆 OpenWrt 源码
    - name: 克隆源码仓库
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH --single-branch openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    # [5] 加载自定义 feeds 配置 (替换默认源)
    - name: 加载自定义 feeds 配置
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    # [6] 更新 feeds (下载最新软件包索引)
    - name: 更新 feeds 索引
      run: cd openwrt && ./scripts/feeds update -a

    # [7] 安装 feeds (将软件包注册到编译系统)
    - name: 安装 feeds 软件包
      run: cd openwrt && ./scripts/feeds install -a

    # [8] 加载自定义配置 (.config + files 目录)
    - name: 加载自定义编译配置
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    # [9] SSH 远程调试 (可选：用于排查编译问题)
    - name: ⚙️ SSH 远程连接调试 (可选)
      uses: mxschmitt/action-tmate@v3  # 使用 tmate 提供临时 SSH 访问
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      # 如需推送通知到 Telegram，可取消下方注释并配置 secrets
      #env:
      #  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      #  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    # [10] 预下载软件包 (避免编译时因网络问题失败)
    - name: 预下载软件包
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    # [11] 编译固件 (核心步骤)
    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    # [12] 检查磁盘使用情况 (调试用)
    - name: 检查磁盘空间使用
      if: (!cancelled())
      run: df -hT

    # [13] 上传 bin 目录到 Actions 产物 (含所有中间文件)
    - name: 上传 bin 目录 (Actions 产物)
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    # [14] 整理固件文件 (移除 packages 目录，只保留固件)
    - name: 整理固件文件
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    # [15] 上传固件到 Actions 产物
    - name: 上传固件 (Actions 产物)
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    # [16] 生成 Release 标签
    - name: 生成 Release 标签
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
         time=$(date +%Y.%m.%d)
         release_tag="360T7-ImmortalWrt-2410-$time"
         release_name="360T7-ImmortalWrt-2410-$time"
         echo "========================================" >> release.txt
         echo "  360T7 ImmortalWrt 固件构建成功" >> release.txt
         echo "========================================" >> release.txt
         echo "📅 构建日期：$time" >> release.txt
         echo "🌐 默认网关：192.168.77.1" >> release.txt
         echo "🔑 登录密码：无 (空)" >> release.txt
         echo "🔧 内置组件：Nikki" >> release.txt
         echo "========================================" >> release.txt
         echo "⚠️ 提示：首次登录请修改默认密码" >> release.txt         
         echo "release_name=$release_name" >> $GITHUB_OUTPUT
         echo "release_tag=$release_tag" >> $GITHUB_OUTPUT
         echo "status=success" >> $GITHUB_OUTPUT

    # [17] 发布固件到 GitHub Releases
    - name: 发布固件到 GitHub Releases
      uses: softprops/action-gh-release@v1
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    # [18] 清理旧的工作流运行记录 (保留最近10次，其余1天后删除)
    - name: 清理旧的工作流记录
      uses: GitRML/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 10

    # [19] 清理旧的 Releases (仅保留最新10个)
    - name: 清理旧的 Releases
      uses: dev-drprasad/delete-older-releases@v0.2.1
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 10
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
